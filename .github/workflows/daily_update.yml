# ════════════════════════════════════════════════════════════════
#  IP·AI 뉴스 브리핑 — 매일 자동 수집 (모듈 2)
#  매일 한국시간(KST) 오전 7시에 GitHub 서버가 뉴스를 수집하여
#  data/news_YYYYMMDD.json 파일을 자동 커밋합니다.
#  (내 PC가 꺼져 있어도 작동합니다)
# ════════════════════════════════════════════════════════════════
name: Daily News Update

on:
  schedule:
    # GitHub Actions는 UTC 기준 → UTC 22:00 = KST 다음날 07:00
    - cron: "0 22 * * *"
  # Actions 탭에서 [Run workflow] 버튼으로 수동 실행도 가능
  workflow_dispatch:

# 자동 커밋을 위한 쓰기 권한
permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Python 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 필요 패키지 설치
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4) 뉴스 수집 파이프라인 실행
      #    (AI 요약을 쓰려면 저장소 Settings → Secrets에 OPENAI_API_KEY 등록)
      - name: Run news pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python data_pipeline.py

      # 5) 새로 생성된 JSON 파일을 자동 커밋 & 푸시
      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 자동 수집 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
            git push
          fi
